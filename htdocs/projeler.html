<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Enes Sancar projeleri — UI/UX, grafik tasarım, web ve masaüstü geliştirme">
  <title>Projeler | Enes Sancar</title>
  <link rel="icon" href="image/internet.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header" id="siteHeader">
    <nav class="navbar">
      <a href="/" class="logo">
        <img src="image/ns.png" alt="Enes Sancar" height="48">
      </a>
      <div class="nav-controls">
        <button id="themeToggle" class="nav-toggle-btn" aria-label="Açık tema"><i class="fa-solid fa-sun"></i></button>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menü" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Ana Sayfa</a></li>
        <li><a href="/hakkimda">Hakkımda</a></li>
        <li><a href="/projeler" class="active">Projeler</a></li>
        <li><a href="/servisler">Servisler</a></li>
        <li><a href="/aktiviteler" class="nav-icon" title="Aktiviteler"><i class="fa-solid fa-icons"></i></a></li>
      </ul>
    </nav>
  </header>

  <main class="projects-page projects-page--loading">
    <noscript>
      <div class="container" style="padding:2rem 0;">
        <p>Projeleri görmek için JavaScript etkinleştirin veya <a href="data/projects.json">projects.json</a> dosyasına bakın.</p>
      </div>
    </noscript>

    <div class="container">
      <div class="projects-hero reveal">
        <span class="section-label"></span>
        <h1></h1>
        <p></p>
      </div>

      <div id="projectsFallback" hidden style="padding:1rem 0;">
        <p>Projeler yüklenemedi. Lütfen sayfayı yenileyin.</p>
      </div>

      <div id="projectsContainer" aria-live="polite">
        <p class="projects-loading" style="opacity:0.7;padding:2rem 0;">Projeler yükleniyor…</p>
      </div>
    </div>
  </main>

  <div id="projectTemplates" hidden aria-hidden="true"></div>

  <div class="project-modal" id="projectModal" aria-hidden="true">
    <div class="project-modal-backdrop" data-close-modal></div>
    <div class="project-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="projectModalTitle">
      <button type="button" class="project-modal-close" aria-label="Kapat" data-close-modal>
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div class="project-modal-content" id="projectModalContent"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-social">
        <a href="https://www.instagram.com/ns.sancar7/?hl=tr" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://open.spotify.com/user/31tlprmrgvur2f4ozlcxvoefkqzm" target="_blank" rel="noopener" aria-label="Spotify"><i class="fa-brands fa-spotify"></i></a>
        <a href="https://github.com/EneSancar" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        <a href="https://discord.com/channels/600470766680801290/600482871286824990" target="_blank" rel="noopener" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
        <a href="https://steamcommunity.com/profiles/76561198886945002/" target="_blank" rel="noopener" aria-label="Steam"><i class="fa-brands fa-steam"></i></a>
      </div>
      <nav class="footer-nav">
        <a href="/">Ana Sayfa</a>
        <a href="/hakkimda">Hakkımda</a>
        <a href="/projeler">Projeler</a>
        <a href="/servisler">Servisler</a>
        <a href="/aktiviteler">Aktiviteler</a>
      </nav>
      <p class="footer-copy">Copyright &copy; 2026 — Designed by <span class="designer">Enes Sancar</span></p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="js/site-content.js"></script>
  <script src="js/projects-renderer.js"></script>
</body>
</html>
