<!DOCTYPE html>

<body>

  <header class="site-header" id="siteHeader">
    <nav class="navbar">
      <a href="/" class="logo">
        <img src="image/ns.png" alt="Enes Sancar" height="48">
      </a>
      <div class="nav-controls">

      <button class="hamburger" id="hamburger" aria-label="Menü" aria-expanded="false">
        <span></span><span></span><span></span>

      <ul class="nav-links" id="navLinks">

        <li><a href="/hakkimda" class="active">Hakkımda</a></li>

    </nav>

  <main class="about-page">
    <noscript>
      <div class="container" style="padding:2rem 0;">
        <p>İçeriği görmek için JavaScript etkinleştirin veya <a href="data/about.json">about.json</a> dosyasına bakın.</p>
      </div>
    </noscript>

    <div id="aboutFallback" class="container" hidden style="padding:2rem 0;">
      <p>Hakkımda içeriği yüklenemedi. Lütfen sayfayı yenileyin.</p>
    </div>

    <div class="container about-layout about-layout--loading" id="aboutRoot">
      <aside class="profile-sidebar">
        <div class="profile-img-wrap">
          <img src="" alt="" class="profile-img" decoding="async">
        </div>
        <div class="profile-info">
          <h1 class="profile-name"></h1>
          <p class="profile-title"></p>
          <div class="profile-social"></div>
        </div>
      </aside>

      <div class="about-content-col about-content-col--loading">
        <section class="info-block reveal" data-about-bio>
          <h2>Hakkımda <i class="fa-solid fa-user"></i></h2>
          <div class="divider"></div>
          <p class="content-loading-text">Yükleniyor…</p>
        </section>

        <section class="info-block reveal" data-about-education>
          <h2>Eğitim <i class="fa-solid fa-user-graduate"></i></h2>
          <div class="divider"></div>
        </section>

        <section class="info-block reveal" data-about-experience>
          <h2>Deneyim <i class="fa-solid fa-user-tie"></i></h2>
          <div class="divider"></div>
        </section>

        <div class="two-col reveal">
          <section class="info-block" data-about-skills>
            <h2>Yetenekler <i class="fa-solid fa-code"></i></h2>
            <div class="divider"></div>
            <ul></ul>
          </section>
          <section class="info-block" data-about-interests>
            <h2>İlgi Alanları <i class="fa-solid fa-table-tennis-paddle-ball"></i></h2>
            <div class="divider"></div>
            <ul></ul>
          </section>
        </div>
      </div>
    </div>

      <div class="footer-social">
