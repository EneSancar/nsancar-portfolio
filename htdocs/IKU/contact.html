<style>
    // ... existing styles ...
    
    /* İletişim Bölümü Stilleri */
    .contact-section {
        padding: 4rem 2rem;
        background: #ffffff;
        margin: 2rem auto;
        max-width: 1200px;
    }
    
    .contact-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
        padding: 1rem;
    }
    
    .contact-info {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
    }
    
    .contact-item {
        text-align: center;
        padding: 2rem;
        border-radius: 10px;
        transition: transform 0.3s ease;
        position: relative;
        background-size: cover;
        background-position: center;
        height: 200px;
        overflow: hidden;
    }
    
    .contact-item-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(130, 6, 11, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        padding: 2rem;
    }
    
    .contact-item i {
        font-size: 2.5rem;
        color: white;
        margin-bottom: 1rem;
    }
    
    .contact-item h3 {
        color: white;
        margin-bottom: 0.5rem;
    }
    
    .contact-item p {
        color: white;
    }
    
    .contact-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .contact-item:hover .contact-item-overlay {
        background: rgba(130, 6, 11, 0.95);
    }
    
    .contact-form {
        background: #f8f9fa;
        padding: 2rem;
        border-radius: 10px;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 1rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
        transition: border-color 0.3s ease;
    }
    
    .form-group textarea {
        height: 150px;
        resize: vertical;
    }
    
    .form-group input:focus,
    .form-group textarea:focus {
        border-color: #3498db;
        outline: none;
    }
    
    .submit-btn {
        width: 100%;
        padding: 1rem;
        background: #82060b;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1.1rem;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }
    
    .submit-btn:hover {
        background: rgba(130, 6, 11, 0.9);
    }
    
    @media (max-width: 768px) {
        .contact-container {
            grid-template-columns: 1fr;
        }
        
        .contact-info {
            grid-template-columns: 1fr;
        }
        
        .contact-item:last-child {
            width: 100%;
        }
    }
    </style>
</head>
