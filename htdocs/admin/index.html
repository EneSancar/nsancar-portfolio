<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin | nsancar.com</title>
  <link rel="icon" href="../image/internet.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">

  <section class="admin-login-wrap" id="loginView">
    <div class="admin-login-card">
      <div class="admin-login-brand">
        <span class="admin-login-logo">NS</span>
        <div>
          <h1>Admin Panel</h1>
          <p>nsancar.com içerik yönetimi</p>
        </div>
      </div>
      <form class="admin-form" id="loginForm">
        <div class="field">
          <label for="adminSecret">Admin gizli anahtarı</label>
          <input type="password" id="adminSecret" autocomplete="current-password" required placeholder="ADMIN_SECRET değeri">
          <p class="field-hint">Vercel’deki <strong>ADMIN_SECRET</strong> ile aynı olmalı.</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Giriş yap</button>
        <div id="loginStatus" class="admin-toast admin-toast--err" hidden></div>
      </form>
      <a href="../index.html" class="admin-login-back"><i class="fa-solid fa-arrow-left"></i> Siteye dön</a>
    </div>
  </section>

  <div class="admin-dashboard" id="dashboardView" hidden>
    <aside class="admin-sidebar">
      <div class="admin-sidebar-brand">
        <span class="admin-login-logo">NS</span>
        <span>İçerik Paneli</span>
      </div>
      <nav class="admin-nav" aria-label="Admin menü">
        <button type="button" class="admin-nav-item is-active" data-tab="about">
          <i class="fa-solid fa-user"></i> Hakkımda
        </button>
        <button type="button" class="admin-nav-item" data-tab="projects">
          <i class="fa-solid fa-folder-open"></i> Projeler
        </button>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="../about.html" target="_blank" rel="noopener"><i class="fa-solid fa-eye"></i> Hakkımda önizle</a>
        <a href="../project.html" target="_blank" rel="noopener"><i class="fa-solid fa-eye"></i> Projeler önizle</a>
        <a href="../index.html"><i class="fa-solid fa-house"></i> Ana site</a>
        <button type="button" class="admin-nav-item admin-nav-item--muted" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i> Çıkış
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <h2 id="panelTitle">Hakkımda</h2>
          <p class="admin-topbar-sub">Değişiklikleri kaydedince site otomatik güncellenir.</p>
        </div>
        <div class="admin-topbar-actions">
          <button type="button" class="btn btn-ghost" id="reloadBtn"><i class="fa-solid fa-rotate-right"></i> Yenile</button>
          <button type="button" class="btn btn-primary" id="saveBtn"><i class="fa-solid fa-cloud-arrow-up"></i> Kaydet</button>
        </div>
      </header>

      <div id="adminStatus" class="admin-toast" hidden></div>

      <div class="admin-content">
        <div id="panelAbout" class="admin-panel-view"></div>
        <div id="panelProjects" class="admin-panel-view" hidden></div>
      </div>
    </main>
  </div>

  <script src="admin-core.js"></script>
  <script src="admin-upload.js"></script>
  <script src="admin-about-ui.js"></script>
  <script src="admin-projects-ui.js"></script>
  <script src="admin.js"></script>
</body>
</html>
